vo=gpu-next
hwdec=yes
dither-depth=no
video-sync=display-resample
macos-render-timer=precise

use-filedir-conf=yes
fullscreen=yes
autofit-larger=75%x75%
osd-bar=no
osd-on-seek=msg
audio-display=no
image-display-duration=inf
screenshot-format=png
screenshot-tag-colorspace=no
screenshot-high-bit-depth=no
screenshot-template="%f-%wH.%wM.%wS.%wT-%#02n"
screenshot-dir=~/Desktop
watch-later-dir=~~cache/watch_later

alang=ja,en,ru,uk
slang=en,ru,uk
sub-font-size=45
sub-border-size=2
sub-use-margins=no
sub-scale-with-window=no
sub-file-paths=subs
sub-fonts-dir=subs/fonts
