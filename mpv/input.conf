9 add ao-volume -5
0 add ao-volume +5

= add video-zoom +.25
- add video-zoom -.25
+ add video-zoom +.05
_ add video-zoom -.05

a cycle audio
A cycle audio down
s cycle sub
S cycle sub down

j screenshot
J screenshot video
Ctrl+j screenshot window

c set clipboard/text "${filename}"; show-text "Copied: ${clipboard/text}"
C set clipboard/text "${time-pos/full}"; show-text "Copied: ${clipboard/text}"

* ignore
/ ignore
SHARP ignore
Alt++ ignore
Alt+- ignore
Alt+s ignore
Ctrl+s ignore
